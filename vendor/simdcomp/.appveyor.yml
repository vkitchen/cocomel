
version: "{branch}.build.{build}"

clone_folder:  c:\projects\simdcomp

#cache:
#        c:\build-cache -> .appveyor.yml

environment:
        matrix:
                - APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2015
                  ARCH: x64
# looks like vc14 has trouble with code on x86, at least on the AppVeyor image
#                - APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2015
#                  ARCH: x86
                - APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2017
                  ARCH: x64
                - APPVEYOR_BUILD_WORKER_IMAGE: Visual Studio 2017
                  ARCH: x86

build_script:
        ps: |
                cd c:\projects\simdcomp
                if ('x64' -eq $env:ARCH) { $platform = 'x64' } else { $platform = 'Win32' }
                # The benchmarks need C++17 plus network access to fetch
                # lemire/counters; skip them in CI and just build/test the library.
                cmake -B build -A $platform -DSIMDCOMP_BUILD_BENCHMARKS=OFF
                cmake --build build --config Release

test_script:
        ps: |
                cd c:\projects\simdcomp
                ctest --test-dir build -C Release --output-on-failure

