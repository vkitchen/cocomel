<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" role="img" aria-label="simdcomp logo">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f7cff"/>
      <stop offset="55%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#g)"/>
  <!-- bits being packed / compressed: wide bars squeezed into a tight block -->
  <g fill="#fff">
    <rect x="13" y="16" width="30" height="5" rx="2.5" opacity="0.95"/>
    <rect x="13" y="25" width="22" height="5" rx="2.5" opacity="0.8"/>
    <rect x="13" y="34" width="14" height="5" rx="2.5" opacity="0.65"/>
    <rect x="13" y="43" width="8"  height="5" rx="2.5" opacity="0.5"/>
  </g>
  <!-- compression arrows -->
  <path d="M50 18 L50 46" stroke="#fff" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <path d="M46 22 L50 18 L54 22" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M46 42 L50 46 L54 42" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
</svg>
